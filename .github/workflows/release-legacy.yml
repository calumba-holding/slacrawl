name: Release Validation (legacy, manual only)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to validate (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Validate unsigned cross-platform packages
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish
