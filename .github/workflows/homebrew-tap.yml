name: Update Homebrew Tap

on:
  repository_dispatch:
    types:
      - release-published

permissions:
  contents: read

env:
  TAP_REPO: openclaw/homebrew-tap
  FORMULA: slacrawl

jobs:
  verify-macos-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-15
            archive-arch: arm64
          - runs-on: macos-15-intel
            archive-arch: amd64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Resolve release tag
        env:
          RELEASE_TAG_INPUT: ${{ github.event.client_payload.tag_name }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG_INPUT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "invalid release tag: $RELEASE_TAG_INPUT" >&2
            exit 1
          }
          printf 'RELEASE_TAG=%s\n' "$RELEASE_TAG_INPUT" >> "$GITHUB_ENV"

      - name: Checkout trusted verifier
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Verify signed macOS release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          draft=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.draft')
          [[ "$draft" == "false" ]] || {
            echo "release is not published: $RELEASE_TAG" >&2
            exit 1
          }
          mkdir -p artifacts
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir artifacts \
            --pattern "sha256sums.txt" \
            --pattern "slacrawl_${version}_darwin_${{ matrix.archive-arch }}.tar.gz"
          scripts/verify-macos-release.sh "$RELEASE_TAG" \
            artifacts/sha256sums.txt \
            "artifacts/slacrawl_${version}_darwin_${{ matrix.archive-arch }}.tar.gz"

  update-tap:
    needs: verify-macos-assets
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        env:
          RELEASE_TAG_INPUT: ${{ github.event.client_payload.tag_name }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG_INPUT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "invalid release tag: $RELEASE_TAG_INPUT" >&2
            exit 1
          }
          printf 'RELEASE_TAG=%s\n' "$RELEASE_TAG_INPUT" >> "$GITHUB_ENV"

      - name: Dispatch tap formula update
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${HOMEBREW_TAP_TOKEN:-${HOMEBREW_TAP_GITHUB_TOKEN:-}}"
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::Homebrew tap sync skipped; set HOMEBREW_TAP_TOKEN with workflow access to ${TAP_REPO}."
            exit 0
          fi

          if ! can_push="$(gh api "repos/${TAP_REPO}" --jq '.permissions.push // false')"; then
            echo "::warning::Homebrew tap sync skipped; HOMEBREW_TAP_TOKEN cannot access ${TAP_REPO}."
            exit 0
          fi
          if [ "${can_push}" != "true" ]; then
            echo "::warning::Homebrew tap sync skipped; HOMEBREW_TAP_TOKEN needs push access to ${TAP_REPO}."
            exit 0
          fi

          request_id="${FORMULA}-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="Update ${FORMULA} for ${RELEASE_TAG} (${request_id})"

          gh workflow run update-formula.yml \
            --repo "${TAP_REPO}" \
            --ref main \
            -f formula="${FORMULA}" \
            -f tag="${RELEASE_TAG}" \
            -f repository="${GITHUB_REPOSITORY}" \
            -f artifact_template="{formula}_{version}_{target}.tar.gz" \
            -f request_id="${request_id}"

          run_id=""
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo "${TAP_REPO}" \
              --workflow update-formula.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle |
              jq -r --arg title "${expected_title}" '.[] | select(.displayTitle == $title) | .databaseId' |
              head -n1)
            if [ -n "${run_id}" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "${run_id}" ]; then
            echo "::error::Could not find tap workflow run with title: ${expected_title}"
            exit 1
          fi

          gh run watch "${run_id}" \
            --repo "${TAP_REPO}" \
            --exit-status \
            --interval 10
