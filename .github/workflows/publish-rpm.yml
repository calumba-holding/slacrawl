name: Publish RPM Packages

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Cloudsmith configuration
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDSMITH_API_KEY}" ]; then
            echo "Secret CLOUDSMITH_API_KEY is required."
            exit 1
          fi

      - name: Download and verify release .rpm assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*.rpm" \
            --pattern "ASSET-INVENTORY.json" \
            --pattern "SHA256SUMS" \
            --dir dist
          shopt -s nullglob
          packages=(dist/*.rpm)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "::error::No .rpm packages found in the release."
            exit 1
          fi
          for pkg in "${packages[@]}"; do
            name="${pkg##*/}"
            expected=$(jq -r --arg name "${name}" '
              .payloads[] |
              select(.name == $name and .kind == "nfpm" and .packageFormat == "rpm") |
              .sha256
            ' dist/ASSET-INVENTORY.json)
            [[ "${expected}" =~ ^[0-9a-f]{64}$ ]] || {
              echo "::error::${name} is not a unique verified RPM package in ASSET-INVENTORY.json."
              exit 1
            }
            observed=$(sha256sum "${pkg}" | cut -d' ' -f1)
            [ "${observed}" = "${expected}" ] || {
              echo "::error::${name} does not match its verified inventory digest."
              exit 1
            }
            grep -Fqx "${expected}  ${name}" dist/SHA256SUMS || {
              echo "::error::${name} is missing from SHA256SUMS."
              exit 1
            }
          done

      - name: Install Cloudsmith CLI
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install cloudsmith-cli==1.11.1

      - name: Publish to Cloudsmith RPM repository
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          CLOUDSMITH_REPO: vincentkoc/slacrawl
          CLOUDSMITH_RPM_DISTRIBUTION: ${{ vars.CLOUDSMITH_RPM_DISTRIBUTION }}
          CLOUDSMITH_RPM_RELEASE: ${{ vars.CLOUDSMITH_RPM_RELEASE }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(dist/*.rpm)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "::error::No .rpm packages found in dist."
            exit 1
          fi
          DISTRO="${CLOUDSMITH_RPM_DISTRIBUTION:-el}"
          RELEASE="${CLOUDSMITH_RPM_RELEASE:-9}"
          TARGET="${CLOUDSMITH_REPO}/${DISTRO}/${RELEASE}"

          for pkg in "${packages[@]}"; do
            cloudsmith push rpm "${TARGET}" "${pkg}" --no-wait-for-sync
          done
